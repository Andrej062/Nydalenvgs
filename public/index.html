<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Nydalen VGS Brukersystem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">

  <section id="loginSection" class="card login-card">
    <h1>Nydalen VGS Brukersystem</h1>
    <p>Logg inn for å få tilgang til brukersystemet.</p>

    <form id="loginForm" class="login-form">
      <input type="email" id="loginEmail" placeholder="E-post" required>
      <input type="password" id="loginPassword" placeholder="Passord" required>
      <button type="submit">Logg inn</button>
    </form>

    <p id="loginMessage" class="login-message"></p>
  </section>

<div id="appSection" style="display: none;">

    <header class="top">
      <div>
        <h1>Nydalen VGS Brukersystem</h1>
        <p>En enkel løsning for å administrere brukere på skolen.</p>
      </div>
    </header>

    <section class="card">
      <h2>Legg til / endre bruker</h2>

      <form id="userForm" class="form-grid">
        <input type="text" id="firstName" placeholder="Fornavn" required>
        <input type="text" id="lastName" placeholder="Etternavn" required>
        <input type="email" id="email" placeholder="E-post" required>
        <input type="text" id="phone" placeholder="Telefonnummer">
        <input type="text" id="address" placeholder="Adresse">

        <select id="role" required>
          <option value="">Velg rolle</option>
        </select>

        <select id="className">
          <option value="">Ingen klasse</option>
        </select>

        <div class="buttons">
          <button type="submit" id="submitButton">Legg til</button>
          <button type="button" id="cancelEditButton" class="secondary" style="display: none;">Avbryt endring</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="table-header">
        <h2>Brukere</h2>

        <div>
          <label for="roleFilter">Vis:</label>
          <select id="roleFilter">
            <option value="alle">Alle</option>
            <option value="elev">Bare elever</option>
            <option value="lærer">Bare lærere</option>
            <option value="admin">Bare admin</option>
            <option value="miljøfagarbeider">Bare miljøfagarbeidere</option>
            <option value="IT-medarbeider">Bare IT-medarbeidere</option>
          </select>
        </div>
      </div>

    <div class="table-wrapper">

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Fornavn</th>
            <th>Etternavn</th>
            <th>E-post</th>
            <th>Telefon</th>
            <th>Adresse</th>
            <th>Rolle</th>
            <th>Klasse</th>
            <th>Handling</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
      </div>
    </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
