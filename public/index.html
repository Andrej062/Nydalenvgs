<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Nydalen VGS Brukersystem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="top">
      <div>
        <h1>Nydalen VGS Brukersystem</h1>
        <p>En enkel løsning for å administrere brukere på skolen.</p>
      </div>
    </header>

    <section class="card">
      <h2>Legg til / endre bruker</h2>

      <form id="userForm" class="form-grid">
        <input type="text" id="firstName" placeholder="Fornavn" required>
        <input type="text" id="lastName" placeholder="Etternavn" required>
        <input type="email" id="email" placeholder="E-post" required>

        <select id="role" required>
          <option value="">Velg rolle</option>
        </select>

        <select id="className">
          <option value="">Ingen klasse</option>
        </select>

        <div class="buttons">
          <button type="submit" id="submitButton">Legg til</button>
          <button type="button" id="cancelEditButton" class="secondary" style="display: none;">Avbryt endring</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="table-header">
        <h2>Brukere</h2>

        <div>
          <label for="roleFilter">Vis:</label>
          <select id="roleFilter">
            <option value="alle">Alle</option>
            <option value="elev">Bare elever</option>
            <option value="lærer">Bare lærere</option>
            <option value="admin">Bare admin</option>
            <option value="miljøfagarbeider">Bare miljøfagarbeidere</option>
            <option value="it-driftekniker">Bare IT-drifteknikere</option>
            <option value="annet">Annet</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Fornavn</th>
            <th>Etternavn</th>
            <th>E-post</th>
            <th>Rolle</th>
            <th>Klasse</th>
            <th>Handling</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
